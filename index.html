<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magical Canvas</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // class 策略：切换 <html class="dark"> 控制 Tailwind dark: 变体
    tailwind.config = { darkMode: 'class' };
    // 首屏即应用持久化主题，避免闪烁（默认深色）
    (function () {
      try {
        var t = localStorage.getItem('mc_theme') || 'dark';
        if (t !== 'light') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      } catch (e) { document.documentElement.classList.add('dark'); }
    })();
  </script>
  <style>
    /* Custom scrollbar for better aesthetics */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0f0f0f;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #444;
    }

    /* 浅色模式滚动条 */
    html:not(.dark) ::-webkit-scrollbar-track { background: #f1f1f1; }
    html:not(.dark) ::-webkit-scrollbar-thumb { background: #ccc; }
    html:not(.dark) ::-webkit-scrollbar-thumb:hover { background: #bbb; }

    body {
      background-color: #050505;
      color: #e5e5e5;
      overflow: hidden;
      /* Prevent body scroll, handle in canvas */
    }
    html:not(.dark) body { background-color: #fafafa; color: #171717; }
  </style>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
